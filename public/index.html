<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Database - Smart File Manager</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📁</text></svg>">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <button class="menu-toggle" id="menuToggle">&#9776;</button>
      <h1 class="logo" id="logoHome">Online Database</h1>
    </div>
    <div class="header-center">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search files, folders, and inside documents..." autocomplete="off">
        <kbd class="search-hint">Ctrl+K</kbd>
      </div>
    </div>
    <div class="header-right">
      <button class="btn btn-primary" id="uploadBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Upload Files
      </button>
      <input type="file" id="fileInput" multiple hidden>
    </div>
  </header>

  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav">
        <div class="nav-section">
          <h3>Quick Access</h3>
          <a href="#" class="nav-item active" data-view="recent">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Recent Files
          </a>
          <a href="#" class="nav-item" data-view="all">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
            All Files
          </a>
        </div>

        <div class="nav-section">
          <h3>Categories</h3>
          <a href="#" class="nav-item" data-view="category" data-category="documents">
            <span class="cat-icon doc">W</span> Documents
          </a>
          <a href="#" class="nav-item" data-view="category" data-category="spreadsheets">
            <span class="cat-icon sheet">X</span> Spreadsheets
          </a>
          <a href="#" class="nav-item" data-view="category" data-category="pdfs">
            <span class="cat-icon pdf">P</span> PDFs
          </a>
          <a href="#" class="nav-item" data-view="category" data-category="presentations">
            <span class="cat-icon pres">S</span> Presentations
          </a>
          <a href="#" class="nav-item" data-view="category" data-category="images">
            <span class="cat-icon img">I</span> Images
          </a>
          <a href="#" class="nav-item" data-view="category" data-category="other">
            <span class="cat-icon other">O</span> Other
          </a>
        </div>

        <div class="nav-section">
          <h3>
            Folders
            <button class="btn-icon" id="newFolderBtn" title="New Folder">+</button>
          </h3>
          <div id="folderTree"></div>
        </div>

        <div class="nav-section">
          <h3>Tags</h3>
          <div id="tagCloud" class="tag-cloud"></div>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div id="storageStats" class="storage-stats"></div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
      <div class="content-header" id="contentHeader">
        <div class="breadcrumb" id="breadcrumb"></div>
        <div class="view-controls">
          <button class="btn-icon view-btn active" data-view-mode="grid" title="Grid View">
            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </button>
          <button class="btn-icon view-btn" data-view-mode="list" title="List View">
            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><rect x="3" y="3" width="18" height="4"/><rect x="3" y="10" width="18" height="4"/><rect x="3" y="17" width="18" height="4"/></svg>
          </button>
        </div>
      </div>

      <div class="file-area" id="fileArea">
        <!-- Files rendered here -->
      </div>
    </main>
  </div>

  <!-- Drop Zone Overlay -->
  <div class="drop-overlay" id="dropOverlay">
    <div class="drop-content">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="64" height="64"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <h2>Drop files here to upload</h2>
      <p>Files will be automatically organized</p>
    </div>
  </div>

  <!-- File Preview Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 id="modalTitle"></h2>
        <button class="btn-icon modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- Upload Progress -->
  <div class="upload-progress" id="uploadProgress">
    <div class="progress-bar" id="progressBar"></div>
    <span class="progress-text" id="progressText"></span>
  </div>

  <!-- Toast Notifications -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
